apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: todo-prod

resources:
- ../../base
- pdb.yaml
- hpa.yaml
- networkpolicy.yaml

commonLabels:
  env: prod

patches:
- path: replicas-patch.yaml
- path: resources-patch.yaml
- path: anti-affinity-patch.yaml

images:
- name: 192.168.56.10:5000/todo-api
  newTag: "1.0.0"
- name: 192.168.56.10:5000/todo-frontend
  newTag: "1.0.0"
