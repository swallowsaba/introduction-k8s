apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
  labels:
    app.kubernetes.io/name: todo-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: todo-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: todo-frontend
    spec:
      containers:
      - name: nginx
        image: todo-frontend
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet: {path: /healthz, port: 80}
        resources:
          requests: {cpu: 50m, memory: 64Mi}
          limits:   {memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: todo-frontend
spec:
  selector:
    app.kubernetes.io/name: todo-frontend
  ports:
  - port: 80
    targetPort: 80
