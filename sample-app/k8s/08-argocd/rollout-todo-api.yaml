# 第8章: Progressive Delivery 用の Rollout (Deployment の代わり)
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: todo-api
  namespace: todo-prod
spec:
  replicas: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: todo-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: todo-api
    spec:
      containers:
      - name: api
        image: 192.168.56.10:5000/todo-api:1.0.0
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef: {name: todo-config}
        - secretRef:    {name: todo-secret}
        readinessProbe:
          httpGet: {path: /readyz, port: 8000}
          periodSeconds: 5
        resources:
          requests: {cpu: 200m, memory: 256Mi}
          limits:   {memory: 512Mi}
  strategy:
    canary:
      canaryService: todo-api-canary
      stableService: todo-api-stable
      trafficRouting:
        nginx:
          stableIngress: todo
      steps:
      - setWeight: 10
      - pause: {duration: 2m}
      - analysis:
          templates:
          - templateName: success-rate
      - setWeight: 30
      - pause: {duration: 2m}
      - setWeight: 60
      - pause: {duration: 2m}
      - setWeight: 100
---
apiVersion: v1
kind: Service
metadata:
  name: todo-api-stable
  namespace: todo-prod
spec:
  selector:
    app.kubernetes.io/name: todo-api
  ports:
  - port: 80
    targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: todo-api-canary
  namespace: todo-prod
spec:
  selector:
    app.kubernetes.io/name: todo-api
  ports:
  - port: 80
    targetPort: 8000
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: todo-prod
spec:
  args:
  - name: service-name
    value: todo-api
  metrics:
  - name: success-rate
    interval: 30s
    count: 4
    successCondition: result[0] >= 0.99
    failureLimit: 1
    provider:
      prometheus:
        address: http://monitor-kube-prometheus-prometheus.monitoring.svc:9090
        query: |
          sum(rate(http_requests_total{job="{{args.service-name}}",code!~"5.."}[1m]))
          /
          sum(rate(http_requests_total{job="{{args.service-name}}"}[1m]))
