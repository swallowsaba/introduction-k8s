apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
  labels:
    {{- include "todo.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  selector:
    matchLabels:
      app.kubernetes.io/name: todo-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: todo-frontend
    spec:
      containers:
      - name: nginx
        image: "{{ .Values.image.registry }}/{{ .Values.image.frontend }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet: {path: /healthz, port: 80}
        livenessProbe:
          httpGet: {path: /healthz, port: 80}
        resources:
          {{- toYaml .Values.resources.frontend | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: todo-frontend
spec:
  selector:
    app.kubernetes.io/name: todo-frontend
  ports:
  - port: 80
    targetPort: 80
